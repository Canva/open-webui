# Alembic configuration for the rebuild backend.
#
# Notes:
#   * `sqlalchemy.url` is intentionally NOT set here. `alembic/env.py`
#     reads it from `app.core.config.settings.DATABASE_URL` at call time
#     so the same URL flows through the FastAPI runtime and Alembic.
#   * `prepend_sys_path = backend` is relative to the directory that
#     `alembic` is invoked from (the rebuild root, via `make migrate`).
#   * `version_path_separator = os` matches the upstream Alembic 1.13+
#     default and lets `version_locations` use the OS-native separator
#     once we have multiple version trees.

[alembic]
script_location = alembic
prepend_sys_path = backend
version_path_separator = os

# Logging configuration. Mirrors the canonical Alembic ini template.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
