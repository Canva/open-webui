env:
  IMAGE_REPO: "699983977898.dkr.ecr.us-east-1.amazonaws.com/container-build/data-platform/open-webui"
  IMAGE_SYNC_AWS_ROLE: container.build.image.sync

# List syntax (- key=value) is valid Buildkite and the dominant pattern for
# pipeline-level agents in Canva's infrastructure repo. Examples:
#   go/platform/platy/provider/aws/cmd/aws/pipeline.yaml
#   tools/oci/build_push_pipeline.yaml
#   buildkite/container-build/pipelines/repo-image-uploader/pipeline.yaml
#   go/ci/signaling/buildkite/server/pipeline.yaml
agents:
  - queue=container-build-prod

steps:
  - label: ":docker: Build image"
    key: build
    commands:
      - >-
        docker build
        --build-arg BUILD_HASH=${BUILDKITE_COMMIT}
        -t ${IMAGE_REPO}:${BUILDKITE_COMMIT}
        .
    plugins:
      - Canva/universal-fetch#stable: ~
      - ecr#v2.9.0:
          login: true
          region: us-east-1
          account-ids: "699983977898"
          assume_role:
            role_arn: arn:aws:iam::421166157161:role/${IMAGE_SYNC_AWS_ROLE}

  - wait

  - label: ":ecr: Push image"
    key: push
    branches: "main"
    commands:
      - >-
        docker build
        --build-arg BUILD_HASH=${BUILDKITE_COMMIT}
        -t ${IMAGE_REPO}:${BUILDKITE_COMMIT}
        -t ${IMAGE_REPO}:latest
        .
      - docker push ${IMAGE_REPO}:${BUILDKITE_COMMIT}
      - docker push ${IMAGE_REPO}:latest
      - |
        buildkite-agent annotate --style success \
          ":docker: Image pushed: \`${IMAGE_REPO}:${BUILDKITE_COMMIT}\`"
    plugins:
      - Canva/universal-fetch#stable: ~
      - ecr#v2.9.0:
          login: true
          region: us-east-1
          account-ids: "699983977898"
          assume_role:
            role_arn: arn:aws:iam::421166157161:role/${IMAGE_SYNC_AWS_ROLE}
